openapi: 3.1.0

info:
  title: Smart Campus — Access Gate Policy API
  version: 1.0.0
  description: |
    REST contract for Pair 10 — Access Gate → Core Business.
    Access Gate calls Core Business in realtime to check access policy.

  contact:
    name: FIT4110 Teaching Team
    email: fit4110@example.edu.vn

servers:
  - url: http://localhost:4010
    description: Prism mock server

  - url: https://api.campus.local
    description: Class network placeholder

tags:
  - name: health
    description: Service health operations

  - name: access
    description: Access control operations

  - name: policy
    description: Access policy management

paths:

  /health:
    get:
      operationId: getHealth
      summary: Check service health
      description: Endpoint for checking service status.
      tags:
        - health
      security: []

      responses:
        '200':
          description: Service healthy

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

              examples:
                ok:
                  value:
                    status: ok
                    service: core-business-policy-api
                    time: '2026-05-10T08:00:00Z'

  /access/check:
    post:
      operationId: checkAccess
      summary: Check realtime access policy
      description: |
        Access Gate calls this endpoint before opening the gate.
        Core Business returns ALLOW or DENY decision.

      tags:
        - access

      security: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessCheckRequest'

            examples:
              employeeRequest:
                value:
                  cardId: "123"
                  gateId: "1"
                  timestamp: "2026-05-12T10:00:00Z"
                  direction: "IN"

      responses:

        '200':
          description: Access decision generated successfully

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'

              examples:
                allowEmployee:
                  value:
                    decisionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    decision: ALLOW
                    reasonCode: VALID_EMPLOYEE
                    policyId: POLICY-001
                    expiresAt: '2026-05-10T18:00:00Z'

                    policyDetail:
                      type: employee
                      department: IT
                      accessLevel: 3

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '409':
          $ref: '#/components/responses/Conflict'

        '422':
          $ref: '#/components/responses/UnprocessableEntity'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /policies/access/{policyId}:
    get:
      operationId: getAccessPolicy
      summary: Get access policy detail
      description: Retrieve access policy information by policy id.

      tags:
        - policy

      security: []

      parameters:
        - name: policyId
          in: path
          required: true

          description: Access policy identifier.

          schema:
            type: string
            example: POLICY-001

      responses:

        '200':
          description: Access policy detail

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicy'

              examples:
                policy:
                  value:
                    policyId: POLICY-001
                    policyName: Employee Office Access
                    active: true
                    createdAt: '2026-05-10T08:00:00Z'

        '404':
          $ref: '#/components/responses/NotFound'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /decisions/{decisionId}:
    get:
      operationId: getDecision
      summary: Get access decision detail
      description: Retrieve previous access decision.

      tags:
        - access

      security: []

      parameters:
        - name: decisionId
          in: path
          required: true

          description: Decision identifier.

          schema:
            type: string
            format: uuid

      responses:

        '200':
          description: Access decision detail

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'

        '404':
          $ref: '#/components/responses/NotFound'

        '500':
          $ref: '#/components/responses/InternalServerError'

components:

  schemas:

    HealthStatus:
      type: object
      additionalProperties: false

      required:
        - status
        - service
        - time

      properties:

        status:
          type: string
          enum:
            - ok

        service:
          type: string
          example: core-business-policy-api

        time:
          type: string
          format: date-time

    AccessCheckRequest:
      type: object
      additionalProperties: false

      required:
        - cardId
        - gateId
        - timestamp
        - direction

      properties:

        cardId:
          type: string
          example: "123"

        gateId:
          type: string
          example: "1"

        timestamp:
          type: string
          format: date-time

        direction:
          type: string

          enum:
            - IN
            - OUT

    AccessDecision:
      type: object
      additionalProperties: false

      required:
        - decisionId
        - decision
        - reasonCode
        - policyId

      properties:

        decisionId:
          type: string
          format: uuid

        decision:
          type: string

          enum:
            - ALLOW
            - DENY

        reasonCode:
          type: string
          example: VALID_EMPLOYEE

        policyId:
          type: string
          example: POLICY-001

        expiresAt:
          type:
            - string
            - 'null'

          format: date-time

        policyDetail:
          oneOf:
            - $ref: '#/components/schemas/EmployeePolicy'
            - $ref: '#/components/schemas/VisitorPolicy'

          discriminator:
            propertyName: type

    EmployeePolicy:
      type: object
      additionalProperties: false

      required:
        - type
        - department
        - accessLevel

      properties:

        type:
          type: string
          const: employee

        department:
          type: string
          example: IT

        accessLevel:
          type: integer
          minimum: 1
          maximum: 5

    VisitorPolicy:
      type: object
      additionalProperties: false

      required:
        - type
        - visitorCompany

      properties:

        type:
          type: string
          const: visitor

        visitorCompany:
          type: string
          example: ABC Corp

        hostName:
          type: string
          example: Nguyen Van A

    AccessPolicy:
      type: object
      additionalProperties: false

      required:
        - policyId
        - policyName
        - active
        - createdAt

      properties:

        policyId:
          type: string
          example: POLICY-001

        policyName:
          type: string
          example: Employee Office Access

        active:
          type: boolean
          example: true

        createdAt:
          type: string
          format: date-time

    Problem:
      type: object
      additionalProperties: false

      required:
        - type
        - title
        - status

      properties:

        type:
          type: string
          format: uri
          example: https://api.campus.local/errors/validation

        title:
          type: string
          example: Invalid request

        status:
          type: integer
          example: 400

        detail:
          type:
            - string
            - 'null'

          example: cardId format invalid

        instance:
          type:
            - string
            - 'null'

          format: uri
          example: https://api.campus.local/access/check

  responses:

    BadRequest:
      description: Invalid request payload

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: Unauthorized request

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource not found

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Conflict:
      description: Duplicate request or business conflict

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    UnprocessableEntity:
      description: Business validation failed

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Unexpected server error

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'